# Flavor config — caches shipped with this flavor's Dockerfile.
# Lives at $XDG_CONFIG_HOME/sbx/flavors/claude/config.toml.
#
# Syntax (one entry per line):
#   "<host_rel>"                          host bind, container = <container_home>/<host_rel>
#   "<host_rel>:<container_path>"         host bind, explicit container path
#   "@<volume_name>:<container_path>"     named docker volume (auto-tracked by clean/purge)
# Container paths that don't start with '/' resolve under container_home.
#
# `~/.local` is persisted as a named volume so claude's self-update versions
# survive container restarts. Delete the entry or replace with a host bind
# (".local") if you'd rather drop persistence or share with the host.
caches = [
    "@sbx-claude-local:.local",
]

# Marks claude as a launchable agent (`sbx claude [args...]`). The runner binds
# the persist entries (below), injects the autonomy flag (unless `--safe`), and
# enables claude's named profiles + remote-control.
#
# persist entries are either a bare path (a scoped dir, from the host home or
# the active profile dir) or an inline table:
#   path          mount path under container_home (and the source path)
#   shared        always bind from the host home, ignoring the active profile
#   file          bind a single file (auto-created) rather than a directory
#   seed          on `profile add`, copy the host's copy into the new profile
#   seed-default  content to write when seeding and the host file is absent
#   store         profile-dir-relative storage path when it differs from `path`
#   optional      bind only if the source exists (never fabricate host files)
#
# claude's split: `.claude` (sessions/history) is shared across profiles, while
# auth swaps per profile - `.claude.json` (account + settings, seeded from host)
# and `.credentials.json` (token, stored at the profile root, overlaid inside
# the shared `.claude` dir only when a profile is active).
[agent]
autonomy = ["--dangerously-skip-permissions"]
profiles = true
remote-control = true

persist = [
    { path = ".claude", shared = true },
    { path = ".claude.json", file = true, seed = true, seed-default = "{}\n", optional = true },
    { path = ".claude/.credentials.json", file = true, store = ".credentials.json" },
]
